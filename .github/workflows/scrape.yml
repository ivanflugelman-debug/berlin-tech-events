name: Scrape Berlin Tech Events

on:
  schedule:
    - cron: '0 8 * * 1'    # Weekly: Monday 8am UTC
    - cron: '0 8 1 * *'    # Monthly: 1st of month 8am UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report mode'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'weekly' }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date +%d)" = "01" ]; then
            echo "mode=monthly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python -m src.main --mode ${{ steps.mode.outputs.mode }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update events (${{ steps.mode.outputs.mode }} — $(date -u +%Y-%m-%d))"
            git push
          fi
